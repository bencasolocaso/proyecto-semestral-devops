
name: ci_cd_backend_eks
on:
  push:
    branches: ["deploy"]

env:
  AWS_REGION: us-east-1
  EKS_NAMESPACE: tienda
  IMAGE_REPO: tienda-backend

jobs:
  build_push_deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout del código
      uses: actions/checkout@v4

    - name: Configurar credenciales temporales de AWS
      run: |
        mkdir -p ~/.aws
        cat > ~/.aws/credentials << EOF
        [default]
        aws_access_key_id=${{ secrets.AWS_ACCESS_KEY_ID }}
        aws_secret_access_key=${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws_session_token=${{ secrets.AWS_SESSION_TOKEN }}
        EOF
        cat > ~/.aws/config << EOF
        [default]
        region=${AWS_REGION}
        output=json
        EOF

    - name: Login seguro a Amazon ECR
      run: |
        aws ecr get-login-password --region ${AWS_REGION} | docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${AWS_REGION}.amazonaws.com

    - name: Construir y publicar imagen Docker inmutable
      run: |
        TAG="eks-${GITHUB_RUN_NUMBER}"
        IMAGE="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${AWS_REGION}.amazonaws.com/${IMAGE_REPO}:${TAG}"
        docker build -t ${IMAGE} ./backend
        docker push ${IMAGE}
        echo "IMAGE=${IMAGE}" >> $GITHUB_ENV

    - name: Conectar Runner a Amazon EKS
      run: |
        aws eks update-kubeconfig --region ${AWS_REGION} --name ${{ secrets.EKS_CLUSTER_NAME }}

    - name: Despliegue en EKS (Rolling Update)
      run: |
        kubectl -n ${EKS_NAMESPACE} set image deployment/backend backend=${IMAGE}
        kubectl -n ${EKS_NAMESPACE} rollout status deployment/backend
