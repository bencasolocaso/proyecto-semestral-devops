name: Build and Push Docker Images to Docker Hub and Deploy to EKS

on:
  push:
    branches: [ deploy ]

env:
  REGISTRY: docker.io
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build y Push Backend Despachos
      - name: Build and push Backend Despachos
        uses: docker/build-push-action@v5
        with:
          context: ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
          file: ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/backend-despacho:latest
            ${{ secrets.DOCKER_USERNAME }}/backend-despacho:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/backend-despacho:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/backend-despacho:buildcache,mode=max

      # Build y Push Backend Ventas
      - name: Build and push Backend Ventas
        uses: docker/build-push-action@v5
        with:
          context: ./back-Ventas_SpringBoot/Springboot-API-REST
          file: ./back-Ventas_SpringBoot/Springboot-API-REST/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/backend-ventas:latest
            ${{ secrets.DOCKER_USERNAME }}/backend-ventas:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/backend-ventas:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/backend-ventas:buildcache,mode=max

      # Build y Push Frontend
      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./front_despacho
          file: ./front_despacho/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/frontend-despacho:latest
            ${{ secrets.DOCKER_USERNAME }}/frontend-despacho:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/frontend-despacho:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/frontend-despacho:buildcache,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Configurar credenciales temporales de AWS Academy (Vocareum)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      # 2. Conectarse al clúster EKS creado
      - name: Update Kubeconfig for EKS
        run: |
          aws eks update-kubeconfig --region us-east-1 --name proyecto-devops-cluster

      # 3. Aplicar los manifiestos de Kubernetes en el clúster
      - name: Deploy manifests to EKS
        run: |
          kubectl apply -f k8s/

      - name: Verify Deployment
        run: |
          kubectl rollout status deployment/frontend-despacho || true
          kubectl rollout status deployment/backend-despacho || true
          kubectl rollout status deployment/backend-ventas || true
          echo "✓ Deployment completed successfully"
