name: Build and Deploy to Amazon EKS

on:
push:
branches: [ deploy ]

env:
AWS_REGION: us-east-1
EKS_CLUSTER_NAME: innovatech-eks

jobs:
build-and-push:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout code
    uses: actions/checkout@v4

  - name: Configure AWS credentials
    uses: aws-actions/configure-aws-credentials@v2
    with:
      aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
      aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
      aws-region: ${{ env.AWS_REGION }}

  - name: Login to Amazon ECR
    id: login-ecr
    uses: aws-actions/amazon-ecr-login@v2

  - name: Build and push Backend Despachos
    uses: docker/build-push-action@v5
    with:
      context: ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
      file: ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO/Dockerfile
      push: true
      tags: ${{ steps.login-ecr.outputs.registry }}/back-despachos:latest

  - name: Build and push Backend Ventas
    uses: docker/build-push-action@v5
    with:
      context: ./back-Ventas_SpringBoot/Springboot-API-REST
      file: ./back-Ventas_SpringBoot/Springboot-API-REST/Dockerfile
      push: true
      tags: ${{ steps.login-ecr.outputs.registry }}/back-ventas:latest

  - name: Build and push Frontend
    uses: docker/build-push-action@v5
    with:
      context: ./front_despacho
      file: ./front_despacho/Dockerfile
      push: true
      tags: ${{ steps.login-ecr.outputs.registry }}/front-despacho:latest
```

deploy:
needs: build-and-push
runs-on: ubuntu-latest

```
steps:
  - name: Checkout code
    uses: actions/checkout@v4

  - name: Configure AWS credentials
    uses: aws-actions/configure-aws-credentials@v2
    with:
      aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
      aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
      aws-region: ${{ env.AWS_REGION }}

  - name: Update kubeconfig
    run: |
      aws eks update-kubeconfig \
        --name ${{ env.EKS_CLUSTER_NAME }} \
        --region ${{ env.AWS_REGION }}

  - name: Verify cluster
    run: |
      kubectl get nodes
      kubectl get deployments -A

  - name: Verify manifests
    run: |
      echo "Contenido del repositorio:"
      ls -la
      echo "Contenido de k8s/:"
      ls -la k8s/

  - name: Deploy to EKS
    run: |
      kubectl apply -f k8s/

      kubectl get deployments
      kubectl get pods

      kubectl rollout restart deployment/backend-despacho || true
      kubectl rollout restart deployment/backend-ventas || true
      kubectl rollout restart deployment/frontend-despacho || true

      kubectl rollout status deployment/backend-despacho || true
      kubectl rollout status deployment/backend-ventas || true
      kubectl rollout status deployment/frontend-despacho || true
```
