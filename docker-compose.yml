version: '3.9'

services:
  # Base de datos MySQL
  mysql-db:
    image: mysql:8.0
    container_name: mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: ${DB_NAME:-despacho_db}
      MYSQL_USER: ${DB_USERNAME:-despacho_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-despacho_pass}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend - Despachos
  backend-despacho:
    build:
      context: ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
      dockerfile: Dockerfile
    container_name: backend-despacho
    environment:
      DB_ENDPOINT: ${DB_ENDPOINT:-mysql-db}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-despacho_db}
      DB_USERNAME: ${DB_USERNAME:-despacho_user}
      DB_PASSWORD: ${DB_PASSWORD:-despacho_pass}
    ports:
      - "8081:8081"
    depends_on:
      mysql-db:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

  # Backend - Ventas
  backend-ventas:
    build:
      context: ./back-Ventas_SpringBoot/Springboot-API-REST
      dockerfile: Dockerfile
    container_name: backend-ventas
    environment:
      DB_ENDPOINT: ${DB_ENDPOINT:-mysql-db}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-despacho_db}
      DB_USERNAME: ${DB_USERNAME:-despacho_user}
      DB_PASSWORD: ${DB_PASSWORD:-despacho_pass}
    ports:
      - "8080:8080"
    depends_on:
      mysql-db:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

  # Frontend - React
  frontend:
    build:
      context: ./front_despacho
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "80:80"
    depends_on:
      - backend-despacho
      - backend-ventas
    networks:
      - app-network
    restart: unless-stopped

volumes:
  mysql-data:

networks:
  app-network:
    driver: bridge
