apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-despacho
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend-despacho
  template:
    metadata:
      labels:
        app: backend-despacho
    spec:
      containers:
      - name: backend-despacho
        # 🔥 Cambiado a la URI interna de su Amazon ECR
        image: 816051012141.dkr.ecr.us-east-1.amazonaws.com/back-despachos:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8081 # Ajustado al puerto real de su SpringBoot
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "prod"
        - name: DB_ENDPOINT
          value: "URL_DE_SU_BASE_DE_DATOS_RDS" # Aquí pegan el endpoint de su BD
        - name: DB_PORT
          value: "3306"
        - name: DB_NAME
          value: "tu_base_datos"
        - name: DB_USERNAME
          value: "admin"
        - name: DB_PASSWORD
          value: "tu_password"
---
apiVersion: v1
kind: Service
metadata:
  name: backend-despacho-service
  namespace: default
spec:
  selector:
    app: backend-despacho
  ports:
  - protocol: TCP
    port: 80        # Puerto interno del clúster
    targetPort: 8081 # Cambiado para que coincida con el contenedor
  type: ClusterIP # 🔥 Cambiado a ClusterIP para cumplir con el DNS interno de la pauta
