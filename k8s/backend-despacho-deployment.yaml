apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-despachos
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend-despachos
  template:
    metadata:
      labels:
        app: backend-despachos
    spec:
      containers:
      - name: backend-despachos
        image: 691743845927.dkr.ecr.us-east-1.amazonaws.com/back-despachos:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8081
        env:
        - name: DB_ENDPOINT
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: endpoint
        - name: DB_PORT
          value: "3306"
        - name: DB_NAME
          value: "despachos_db"
        - name: DB_USERNAME
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: username
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: password
        resources:
          requests:
            cpu: "200m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: backend-despachos-service
  namespace: default
spec:
  selector:
    app: backend-despachos
  ports:
  - protocol: TCP
    port: 8081
    targetPort: 8081
  type: ClusterIP
