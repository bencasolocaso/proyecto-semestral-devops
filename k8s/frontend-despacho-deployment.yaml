apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-despacho
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend-despacho
  template:
    metadata:
      labels:
        app: frontend-despacho
    spec:
      containers:
      - name: frontend-despacho
        image: <TU_ACCOUNT_ID>.dkr.ecr.us-east-1.amazonaws.com/front-despacho:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "250m"
            memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-despacho-service
  namespace: default
spec:
  selector:
    app: frontend-despacho
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
  type: LoadBalancer
